<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-title" content="电子衣橱">
  <title>电子衣橱</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
  <div id="app-container">
    <header class="app-header">
      <div class="nav-container">
        <h1>电子衣橱</h1>
        <nav class="nav">
          <button class="nav-btn active" data-view="dashboard">📊</button>
          <button class="nav-btn" data-view="wardrobe">🧥</button>
          <button class="nav-btn" data-view="finance">💰</button>
          <button class="nav-btn" data-view="settings">⚙️</button>
        </nav>
      </div>
      <div class="sync-status" id="sync-status">
        <span class="status-dot online"></span>
        <span class="status-text">已连接</span>
      </div>
    </header>

    <main id="app" class="app-main">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
      <section id="content" class="content" hidden></section>
    </main>

    <div id="modal-overlay" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">编辑项目</h3>
          <button id="modal-close" class="close-btn">&times;</button>
        </div>
        <div id="modal-body" class="modal-body">
          <form id="edit-form"></form>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel" class="btn btn-secondary">取消</button>
          <button id="modal-save" class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <small>© 2026 Digital Wardrobe</small>
    </footer>

    <button id="global-fast-import-btn" class="fab" title="极速导入">📸</button>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="module" src="../src/app.js"></script>
</body>
</html>
